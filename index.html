<main class="grid">
  <section>
    <span class="tab">Live Feed</span>

    <div class="videoBox" id="videoBox"></div>

    <div class="status" id="detected">Analysing&hellip;</div>

    <button class="btn" id="beginBtn">
      Begin Again
    </button>
  </section>

  <section>
    <span class="tab">Transcript</span>

    <div class="transcript" id="transcript"></div>

    <div class="controls">
      <input
        id="reply"
        type="text"
        placeholder="Type your reply&hellip;"
      />

      <button class="btn" id="replyBtn">
        Send
      </button>
    </div>
  </section>
</main>
